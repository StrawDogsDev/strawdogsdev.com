[build]
  command = "npm run build"
  publish = "dist"

# /publishers retired → /partners
[[redirects]]
  from = "/publishers"
  to = "/partners/"
  status = 301
  force = true

[[redirects]]
  from = "/publishers/"
  to = "/partners/"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
